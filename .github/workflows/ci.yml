name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: |
          bun run --filter '*' typecheck

      - name: Run tests
        run: bun test packages/core/tests

      - name: Check formatting
        run: |
          if command -v biome &> /dev/null; then biome check .; fi

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          cd packages/core && bun run typecheck
          cd ../pi-adapter && bun run typecheck
          cd ../opencode-adapter && bun run typecheck
          cd ../cli && bun run typecheck