name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# id-token: write is required for npm Trusted Publishing (OIDC).
# Configure the npm package's Trusted Publisher to this workflow path.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version or publish packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node for npm Trusted Publishing
        uses: actions/setup-node@v6
        with:
          # Node 24 includes npm >= 11, required for OIDC trusted publishing.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup runtime stubs for optional peer dependencies
        run: bun run setup-stubs

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Validate Pi extension npm package
        run: bun run pack:pi

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bunx changeset version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
