name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# id-token: write is REQUIRED for npm Trusted Publishing (OIDC).
# No NPM_TOKEN secret is used; npm exchanges the GitHub OIDC token
# for a short-lived publish token at publish time.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for changesets + npm publish via OIDC)
        uses: actions/setup-node@v6
        with:
          # Node 24 ships npm >= 11, which is required for npm Trusted
          # Publishing (OIDC). Avoid 'npm install -g npm@latest' on
          # older Node versions: it breaks the bundled npm install on
          # GitHub-hosted runners (missing transitive deps in arborist).
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bunx changeset version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Provenance attestation is auto-attached when publishing from
          # a public GitHub Actions workflow with id-token: write.
          NPM_CONFIG_PROVENANCE: "true"
